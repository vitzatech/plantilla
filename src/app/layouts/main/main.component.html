<div class="dashboard-root" (click)="closeAllDropdowns()">

    <!-- SIDEBAR COMPONENT -->
    <aside class="sidebar" [class.collapsed]="isCollapsed()">
        <div class="sidebar-brand">
            <img src="/logo.png" alt="[Nombre APP]" class="logo-iso">
        </div>

        <nav class="nav-section">
            <div class="nav-label">Monitoreo</div>
            <a class="nav-link" routerLink="/dashboard" routerLinkActive="active">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7"></rect>
                    <rect x="14" y="3" width="7" height="7"></rect>
                    <rect x="14" y="14" width="7" height="7"></rect>
                    <rect x="3" y="14" width="7" height="7"></rect>
                </svg>
                <span class="nav-text" *ngIf="!isCollapsed()">Dashboard Global</span>
            </a>

            <div class="nav-label">Administración</div>
            <a class="nav-link" routerLink="/aplicaciones" routerLinkActive="active">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                    <line x1="8" y1="21" x2="16" y2="21"></line>
                    <line x1="12" y1="17" x2="12" y2="21"></line>
                </svg>
                <span class="nav-text" *ngIf="!isCollapsed()">Aplicaciones</span>
            </a>

            <a class="nav-link" routerLink="/usuarios" routerLinkActive="active">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                </svg>
                <span class="nav-text" *ngIf="!isCollapsed()">Usuarios</span>
            </a>
        </nav>

        <!-- SIDEBAR TOGGLE FOOTER -->
        <div class="sidebar-footer">
            <button class="toggle-sidebar-btn" (click)="toggleSidebar()">
                <svg *ngIf="!isCollapsed()" xmlns="http://www.w3.org/2000/svg" width="20" height="20"
                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                    stroke-linejoin="round">
                    <polyline points="11 17 6 12 11 7"></polyline>
                    <polyline points="18 17 13 12 18 7"></polyline>
                </svg>
                <svg *ngIf="isCollapsed()" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                    fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="13 17 18 12 13 7"></polyline>
                    <polyline points="6 17 11 12 6 7"></polyline>
                </svg>
                <span class="toggle-text" *ngIf="!isCollapsed()">Contraer barra lateral</span>
            </button>
        </div>
    </aside>

    <!-- MAIN WRAPPER COMPONENT -->
    <div class="main-wrapper">
        <!-- HEADER PRO COMPONENT -->
        <header class="header-pro">
            <div class="brand-entity">
                <div class="brand-symbol">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M12 22C12 22 20 18 20 12V5L12 2L4 5V12C4 18 12 22 12 22Z" fill="var(--blue)"
                            fill-opacity="0.15"></path>
                        <path d="M9 12L11 14L15 10"></path>
                    </svg>
                </div>
                <div class="brand-info">
                    <span class="brand-main">[Nombre APP]</span>
                    <span class="brand-sub">[Descripción APP]</span>
                </div>
                <div class="header-divider"></div>
                <div class="status-indicator">
                    <span class="badge bg-blue" style="font-size: 0.65rem; letter-spacing: 1px;">[MENSAJE DE
                        ESTADO]</span>
                </div>
            </div>

            <div class="user-nav">
                <div class="user-btn" (click)="toggleUserDropdown($event)">
                    <div class="avatar-box">AD</div>
                    <div style="display: flex; flex-direction: column; text-align: left; line-height: 1.2;">
                        <span class="user-display-name">Administrador</span>
                        <span class="user-display-role">admin</span>
                    </div>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
                        style="margin-left: 5px; opacity: 0.6;">
                        <polyline points="6 9 12 15 18 9"></polyline>
                    </svg>
                </div>

                <div class="dropdown-pro" [class.show]="showUserDropdown()" id="userDropdown">
                    <div class="user-dropdown-header">
                        <span class="user-display-name">Administrador Principal</span>
                        <span class="user-display-role">admin@axis.local</span>
                    </div>
                    <div class="dropdown-divider"></div>

                    <!-- CONFIGURATIONS INSIDE USER DROPDOWN -->
                    <div style="padding: 8px 16px 4px 16px;">
                        <div class="dropdown-item" style="padding: 4px 0; margin-bottom: 4px;"
                            (click)="toggleTheme(); $event.stopPropagation()">
                            <div style="display: flex; align-items: center; gap: 12px; flex-grow: 1;">
                                <svg *ngIf="!isDark()" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round" style="color: var(--warning);">
                                    <circle cx="12" cy="12" r="5"></circle>
                                    <line x1="12" y1="1" x2="12" y2="3"></line>
                                    <line x1="12" y1="21" x2="12" y2="23"></line>
                                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                                    <line x1="1" y1="12" x2="3" y2="12"></line>
                                    <line x1="21" y1="12" x2="23" y2="12"></line>
                                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                                </svg>
                                <svg *ngIf="isDark()" xmlns="http://www.w3.org/2000/svg" width="18" height="18"
                                    viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                    stroke-linecap="round" stroke-linejoin="round" style="color: var(--blue);">
                                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                                </svg>
                                <span style="font-weight: 500;">{{ isDark() ? 'Modo Noche' : 'Modo Día' }}</span>
                            </div>
                            <label class="switch-minimal" style="pointer-events: none;">
                                <input type="checkbox" [checked]="isDark()">
                                <span class="slider-minimal"></span>
                            </label>
                        </div>
                        <div class="dropdown-divider"></div>
                        <div
                            style="display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: 8px;">
                            <span class="section-title" style="margin: 0; padding: 0;">Idioma</span>
                            <div class="lang-selector-group" style="flex: 0.7;">
                                <button [class.active]="currentLang() === 'ES'"
                                    (click)="setLang('ES'); $event.stopPropagation()">ES</button>
                                <button [class.active]="currentLang() === 'EN'"
                                    (click)="setLang('EN'); $event.stopPropagation()">EN</button>
                                <button [class.active]="currentLang() === 'DE'"
                                    (click)="setLang('DE'); $event.stopPropagation()">DE</button>
                            </div>
                        </div>
                    </div>

                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item">Mi Perfil Profesional</div>
                    <div class="dropdown-item">Ajustes de Seguridad</div>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item logout-btn">Cerrar Sesión</div>
                </div>
            </div>
        </header>

        <!-- PAGE CONTENT COMPONENT -->
        <main style="flex-grow: 1; overflow-y: auto;">
            <router-outlet></router-outlet>
        </main>
    </div>
</div>
